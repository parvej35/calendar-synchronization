  <text x="120" y="510" fill="#38bdf8" font-family="Arial, sans-serif" font-size="28" font-weight="700">Summarize</text>
  <text x="120" y="550" fill="#94a3b8" font-family="Arial, sans-serif" font-size="22">Include title, time, duration, location, and description.</text>
