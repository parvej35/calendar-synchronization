<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Email summary placeholder">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <rect x="80" y="60" width="1040" height="580" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="120" y="120" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="700">Calendar Summary Email</text>
  <text x="120" y="160" fill="#475569" font-family="Arial, sans-serif" font-size="22">Here is your Google Calendar summary:</text>
  <rect x="120" y="200" width="960" height="360" fill="#ffffff" stroke="#94a3b8"/>
  <line x1="120" y1="250" x2="1080" y2="250" stroke="#94a3b8"/>
  <text x="140" y="234" fill="#0369a1" font-family="Arial, sans-serif" font-size="18" font-weight="700">Title</text>
  <text x="320" y="234" fill="#0369a1" font-family="Arial, sans-serif" font-size="18" font-weight="700">Time</text>
  <text x="570" y="234" fill="#0369a1" font-family="Arial, sans-serif" font-size="18" font-weight="700">Duration</text>
  <text x="700" y="234" fill="#0369a1" font-family="Arial, sans-serif" font-size="18" font-weight="700">Location</text>
  <text x="860" y="234" fill="#0369a1" font-family="Arial, sans-serif" font-size="18" font-weight="700">Description</text>
  <text x="140" y="292" fill="#0f172a" font-family="Arial, sans-serif" font-size="17">Team Sync</text>
  <text x="320" y="292" fill="#0f172a" font-family="Arial, sans-serif" font-size="17">Apr 30, 2026, 9:00 AM - 10:00 AM</text>
  <text x="570" y="292" fill="#0f172a" font-family="Arial, sans-serif" font-size="17">1h</text>
  <text x="700" y="292" fill="#0f172a" font-family="Arial, sans-serif" font-size="17">Room A</text>
  <text x="860" y="292" fill="#0f172a" font-family="Arial, sans-serif" font-size="17">Weekly standup</text>
</svg>
